<div class="max-w-6xl mx-auto p-4">
  <!-- Profile Header -->
  <div
    class="bg-white rounded-2xl shadow border p-6 flex flex-col md:flex-row items-center md:items-start gap-6"
  >
    <!-- Profile Image -->
    <img
      [src]="friend.photo"
      class="w-28 h-28 rounded-full object-cover border"
    />

    <!-- User Info -->
    <div class="text-center md:text-left flex-1">
      <h2 class="text-2xl font-bold">{{ friend.name }}</h2>
      <p class="text-gray-500">#{{ friend.username }}</p>

      <div
        class="flex flex-wrap justify-center md:justify-start gap-6 mt-4 text-sm"
      >
        <div>
          <span class="font-bold">{{ friend.followersCount }}</span>
          <p class="text-gray-400">Followers</p>
        </div>

        <div>
          <span class="font-bold">{{ friend.followingCount }}</span>
          <p class="text-gray-400">Following</p>
        </div>

        <div>
          <span class="font-bold">{{ friend.bookmarksCount }}</span>
          <p class="text-gray-400">Bookmarks</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Followers Section -->
  <div class="mt-8">
    <h3 class="text-xl font-semibold mb-4">Followers</h3>

    <div
      class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"
    >
      @for (follower of friend.followers; track follower._id) {
        <div
          class="bg-white p-3 rounded-xl shadow border flex flex-col items-center text-center hover:shadow-md transition"
        >
          <img
            [src]="follower.photo"
            class="w-16 h-16 rounded-full object-cover mb-2"
          />

          <p class="font-medium text-sm line-clamp-1">
            {{ follower.name }}
          </p>

          <!-- <span class="text-xs text-gray-400"> ID: {{ follower.id }} </span> -->
        </div>
      }
    </div>
  </div>
</div>
