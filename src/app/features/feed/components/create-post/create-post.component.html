<form
    #form
    (submit)="submitForm($event, form)"
    class="w-full bg-white rounded-[16px] shadow-sm border border-slate-200 p-4 font-sans flex flex-col"
  >
    <div class="flex items-center gap-3 mb-3">
      <img
        [src]="userImg"
        [alt]="userName"
        class="w-10 h-10 rounded-full object-cover shrink-0 bg-slate-100 border border-slate-50"
      />

      <div>
        <span class="text-[15px] font-bold text-slate-900 leading-tight">{{
          userName
        }}</span>

        <div
          class="flex p-1 w-fit items-center bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body"
        >
          <i class="fa-solid fa-earth-americas text-[11px] text-slate-600"></i>

          <select
            [formControl]="privacy"
            class="border-none bg-transparent cursor-pointer ring-0 py-0 px-2 text-xs"
          >
            <option value="public">public</option>
            <option value="following">followers</option>
            <option value="only_me">only me</option>
          </select>
        </div>
      </div>
    </div>

    <div class="mb-4">
      <textarea
        [formControl]="content"
        class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-[15px] text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-300 transition-all resize-y min-h-30"
        placeholder="What's on your mind...?"
        aria-label="Create a new post"
      ></textarea>
    </div>

    <hr class="border-t border-slate-800 mb-4" />
    @if (imgUrl) {
      <div class="relative">
        <img
        [src]="imgUrl"
        class="w-full h-75 object-cover my-2"
        [alt]="imgAlt"
      />
      <span (click)="close()"><i class="fas fa-close absolute top-4 inset-e-4 cursor-pointer"></i></span>
      </div>
    }
    <div class="flex items-center justify-between">
      <input
        (change)="changeFile($event)"
        type="file"
        id="file"
        class="hidden"
      />
      <label
        for="file"
        class="flex cursor-pointer items-center gap-2 text-slate-600 hover:bg-slate-50 px-2 py-1.5 rounded-lg transition-colors group"
      >
        <i
          class="fa-regular fa-image text-[#22c55e] text-[1.1rem] group-hover:scale-110 transition-transform"
        ></i>
        <span class="text-[14px] font-semibold text-slate-600"
          >Photo/video</span
        >
      </label>

      <button type="submit"
        class="cursor-pointer bg-blue-500 text-white px-5 py-2 rounded-lg font-bold text-[14px] flex items-center gap-2 focus:ring-4 focus:ring-blue-200 outline-none"
      >
        Post
        <i class="fa-regular fa-paper-plane text-sm"></i>
      </button>
    </div>
  </form>
