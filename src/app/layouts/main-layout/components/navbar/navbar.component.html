<nav
  class="bg-neutral-primary w-full z-20 top-0 inset-s-0 border-b border-default"
>
  <div
    class="max-w-7xl flex flex-wrap items-center justify-between mx-auto p-2 px-10"
  >
    <a
      routerLink="/feed"
      class="flex items-center space-x-3 rtl:space-x-reverse"
    >
      <span
        class="self-center text-xl text-blue-700 font-semibold whitespace-nowrap"
        >Social App</span
      >
    </a>
    <div
      class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse"
    >
      <button
        type="button"
        class="flex text-sm bg-neutral-primary rounded-full md:me-0 focus:ring-4 focus:ring-neutral-tertiary cursor-pointer"
        id="user-menu-button"
        aria-expanded="false"
        data-dropdown-toggle="user-dropdown"
        data-dropdown-placement="bottom"
      >
        <span class="sr-only">Open user menu</span>
        <img
          class="w-8 h-8 rounded-full"
          [src]="userImg"
          [alt]="userName"
        />
      </button>
      <!-- Dropdown menu -->
      <div
        class="z-50 hidden bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-44"
        id="user-dropdown"
      >
        <div class="px-4 py-3 text-sm border-b border-default">
          <span class="block text-heading font-medium">{{userName}}</span>
        </div>
        <ul
          class="p-2 text-sm text-body font-medium"
          aria-labelledby="user-menu-button"
        >
          <li>
            <a
              routerLink="/profile"
              routerLinkActive="text-mainColor bg-white"
              class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded cursor-pointer"
              ><i class="fa-regular fa-user"></i> Profile</a
            >
          </li>
          <li>
            <a
              routerLink="/change-password"
              class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded cursor-pointer"
            >
              <i class="fa-solid fa-gear me-2"></i> Change Password</a
            >
          </li>
          <li>
            <a
              (click)="logOut()"
              class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded cursor-pointer"
            >
              <i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Log
              out</a
            >
          </li>
        </ul>
      </div>
      <button
      id="navbar-user"
        data-collapse-toggle="navbar-user"
        type="button"
        class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
        aria-controls="navbar-user"
        aria-expanded="false"
      >
        <span class="sr-only">Open main menu</span>
        <svg
          class="w-6 h-6"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="2"
            d="M5 7h14M5 12h14M5 17h14"
          />
        </svg>
      </button>
    </div>
  </div>
</nav>
