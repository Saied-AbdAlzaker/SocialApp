<aside
  class="w-full text-sm sticky top-0 bg-white rounded-[20px] shadow-sm border border-slate-50 p-2.5 flex flex-col gap-1 mt-2"
  aria-label="Sidebar Navigation"
>
  <button routerLink="/feed" routerLinkActive="bg-blue-50 text-blue-600"
    class="flex items-center gap-4 p-2 cursor-pointer rounded-xl font-semibold transition-colors duration-200"
  >
    <i class="fa-regular fa-newspaper w-5 text-center"></i>
    <span class="">Feed</span>
  </button>

  <button
    routerLink="/notification" routerLinkActive="bg-blue-50 text-blue-600"
    class="flex items-center gap-4 p-2 cursor-pointer rounded-xl font-semibold transition-colors duration-200"
  >
    <i
      class="fa-regular fa-comment w-5 text-center text-slate-500 group-hover:text-slate-700 transition-colors"
    ></i>
    <span>Notification</span>
  </button>

  <button  routerLink="/posts" routerLinkActive="bg-blue-50 text-blue-600"
    class="flex items-center gap-4 p-2 cursor-pointer rounded-xl font-semibold transition-colors duration-200"
  >
    <i
      class="fa-solid fa-globe w-5 text-center text-slate-500 group-hover:text-slate-700 transition-colors"
    ></i>
    <span>My Posts</span>
  </button>

  <button routerLink="/save-post" routerLinkActive="bg-blue-50 text-blue-600"
    class="flex items-center gap-4 p-2 cursor-pointer rounded-xl font-semibold transition-colors duration-200"
  >
    <i
      class="fa-regular fa-bookmark w-5 text-center text-slate-500 group-hover:text-slate-700 transition-colors"
    ></i>
    <span>Saved</span>
  </button>
</aside>
