<aside
  class="bg-white sticky top-0 rounded-3xl shadow-sm border border-slate-100 p-4 font-sans mt-2"
>
  <div class="flex items-center justify-between mb-4 px-1">
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-user-group text-blue-600 text-[1.1rem]"></i>
      <h2 class="font-bold text-slate-900 text-[17px]">Suggested Friends</h2>
    </div>
    <span
      class="bg-slate-100 text-slate-600 text-xs font-bold px-2.5 py-1 rounded-full"
      >{{ suggestionList.length }}</span
    >
  </div>

  @for (suggestion of suggestionList; track suggestion._id) {
    <div class="grid gap-3 overflow-auto max-h-88 pb-1">
      <div
        class="border border-slate-200 rounded-2xl bg-white hover:border-slate-300 transition-colors"
      >
        <div class="flex items-start gap-3 py-2">
          <img
            [src]="suggestion.photo"
            [alt]="suggestion.name"
            class="w-11 h-11 rounded-full object-cover shrink-0 bg-slate-100 border border-slate-50"
          />

          <div class="flex-1 min-w-0 flex flex-col gap-2">
            <div class="flex items-center justify-between gap-2 mt-0.5">
              <div class="flex flex-col min-w-0">
                <span
                  class="text-[14px] font-bold text-slate-900 truncate leading-tight"
                  >{{ suggestion.name }}</span
                >
                <span
                  class="text-[13px] text-slate-500 truncate leading-tight mt-0.5"
                  >{{ suggestion.username }}...</span
                >
              </div>
              <button
                (click)="followAndUnfollow(suggestion._id)"
                [class.text-blue-600]="!followingMap[suggestion._id]"
                class="shrink-0 flex items-center cursor-pointer gap-1.5 px-3.5 py-1.5 bg-blue-50 hover:bg-blue-100 text-sm font-bold rounded-xl transition-colors"
              >
                <i
                  class="fa-solid text-[11px]"
                  [class.fa-user-plus]="!followingMap[suggestion._id]"
                  [class.fa-check]="followingMap[suggestion._id]"
                ></i>
                {{ followingMap[suggestion._id] ? "Following" : "Follow" }}
              </button>
            </div>

            <div class="flex items-center gap-2">
              <span
                class="text-[11px] font-semibold text-slate-500 bg-slate-100/80 px-2 py-1 rounded-lg"
                >{{ suggestion.followersCount }} followers</span
              >
              <span
                class="text-[11px] font-semibold text-blue-500 bg-blue-50 px-2 py-1 rounded-lg"
                >{{ suggestion.mutualFollowersCount }} mutual</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <button
      [routerLink]="[`/suggestion/${suggestion._id}`]"
      class="w-full mb-3 mt-2 cursor-pointer py-2.5 bg-white border border-slate-200 rounded-xl text-[14px] font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all outline-none focus:ring-4 focus:ring-slate-100"
    >
      View more
    </button>
  }
</aside>
